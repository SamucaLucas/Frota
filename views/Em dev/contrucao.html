{{define "Construcao"}}
<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Em Desenvolvimento - Sousa Transportes</title>
    <link rel="stylesheet" href="/static/style.css">
</head>

<body>
    <div class="app-container">

        <div class="hero" style="padding-bottom:20px">
            <div class="hero-accent"></div>
            <div style="margin-top:8px">
                <div class="brand-container">
                    <img src="/static/img/Logo-branco.png" alt="Sousa Transportes" class="sousa-logo logo-dark">

                    <img src="/static/img/logo.png" alt="Sousa Transportes" class="sousa-logo logo-white">
                </div>
            </div>
        </div>

        <div
            style="flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:24px; background:var(--bg2);">

            <div style="font-size: 64px; margin-bottom: 16px; animation: bounce 2s infinite;">🚧</div>

            <h2 style="font-size:20px; font-weight: 800; color:var(--t1); text-align:center; margin-bottom: 12px;">
                Funcionalidade em Construção
            </h2>

            <p style="font-size:13px; color:var(--t3); text-align:center; line-height:1.6; margin-bottom: 32px;">
                Esta área está sendo desenvolvida com muito cuidado para a versão final do nosso aplicativo. Novidades
                em breve!
            </p>

            <a class="btn" href="/login">← Voltar para a tela anterior</a>

        </div>
    </div>
    <script src="/static/app.js"></script>
</body>

</html>
{{end}}
